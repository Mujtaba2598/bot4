services:
  - type: web
    name: halal-trading-bot
    runtime: node
    repo: https://github.com/YOUR_USERNAME/halal-trading-bot
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
